apiVersion: argoproj.io/v1alpha1
kind: WorkflowTemplate
metadata:
  name: user-workflow
  namespace: argo
spec:
  entrypoint: run
  arguments:
    parameters:
      - name: s3_bucket
      - name: s3_folder
      - name: workflow_parameters   # JSON string: {"param1": "val1", "param2": "val2", ...}

  templates:
    - name: run
      inputs:
        parameters:
          - name: s3_bucket
          - name: s3_folder
          - name: workflow_parameters

      initContainers:
        - name: pull-from-s3
          image: amazon/aws-cli:latest
          command:
            - "aws"
            - "s3"
            - "cp"
            - "s3://{{inputs.parameters.s3_bucket}}/{{inputs.parameters.s3_folder}}/"
            - "/app/work_dir/"
            - "--recursive"
          env:
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: dashboard-app-secrets
                  key: AWS_S3_ACCESS_KEY
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: dashboard-app-secrets
                  key: AWS_S3_SECRET_KEY
            - name: AWS_DEFAULT_REGION
              valueFrom:
                secretKeyRef:
                  name: dashboard-app-secrets
                  key: AWS_REGION
          volumeMounts:
            - name: work-dir
              mountPath: /app/work_dir

      container:
        # image: 205207316191.dkr.ecr.us-east-1.amazonaws.com/dashboard-backend
        image: rprakash262/dashboard-backend:latest
        imagePullPolicy: Always
        command: ["python", "/app/work_dir/workflow.py"]
        env:
          # ── Dynamic user workflow parameters (JSON string) ─────────────────
          # In workflow.py, read with: json.loads(os.environ["WORKFLOW_PARAMETERS"])
          - name: WORKFLOW_PARAMETERS
            value: "{{inputs.parameters.workflow_parameters}}"

          # ── Python path so user modules in work_dir resolve ────────────────
          - name: PYTHONPATH
            value: "/app:/app/work_dir"

          # ── Dashboard database ─────────────────────────────────────────────
          - name: DB_HOST
            valueFrom:
              secretKeyRef:
                name: dashboard-app-secrets
                key: DB_HOST
          - name: DB_PORT
            valueFrom:
              secretKeyRef:
                name: dashboard-app-secrets
                key: DB_PORT
          - name: DB_NAME
            valueFrom:
              secretKeyRef:
                name: dashboard-app-secrets
                key: DB_NAME
          - name: DB_USERNAME
            valueFrom:
              secretKeyRef:
                name: dashboard-app-secrets
                key: DB_USERNAME
          - name: DB_PASSWORD
            valueFrom:
              secretKeyRef:
                name: dashboard-app-secrets
                key: DB_PASSWORD

          # ── AWS / S3 ───────────────────────────────────────────────────────
          - name: AWS_S3_ACCESS_KEY
            valueFrom:
              secretKeyRef:
                name: dashboard-app-secrets
                key: AWS_S3_ACCESS_KEY
          - name: AWS_S3_SECRET_KEY
            valueFrom:
              secretKeyRef:
                name: dashboard-app-secrets
                key: AWS_S3_SECRET_KEY
          - name: AWS_S3_BUCKET
            valueFrom:
              secretKeyRef:
                name: dashboard-app-secrets
                key: AWS_S3_BUCKET
          - name: AWS_REGION
            valueFrom:
              secretKeyRef:
                name: dashboard-app-secrets
                key: AWS_REGION

        volumeMounts:
          - name: work-dir
            mountPath: /app/work_dir

      volumes:
        - name: work-dir
          emptyDir: {}
